# ===================================================================
# SPRING BOOT APPLICATION CONFIGURATION
# ===================================================================

# Define the name of our Spring Boot application.
spring.application.name=backend

# -------------------------------------------------------------------
# DATABASE CONNECTION PROPERTIES (MySQL)
# -------------------------------------------------------------------

# The JDBC URL used to connect to our MySQL database.
# - 'jdbc:mysql://' tells Java we are using the JDBC driver for MySQL.
# - 'localhost:3306' is the host address and port where our MySQL server is running.
# - '/event_management_db' is the database we created.
# - '?useSSL=false' disables SSL encrypted communication (ideal for local testing).
# - '&serverTimezone=UTC' standardizes the database timezone to Coordinated Universal Time.
# - '&allowPublicKeyRetrieval=true' allows the JDBC driver to retrieve the database server's public key (helps avoid password hashing issues in MySQL 8.x).
spring.datasource.url=jdbc:mysql://localhost:3306/event_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# The username used to log in to our MySQL database.
spring.datasource.username=root

# The password used to log in to our MySQL database.
spring.datasource.password=Vishal@2004

# The fully qualified Java class name of the MySQL JDBC driver.
# This driver is the translator that allows our Java application to talk to the MySQL database engine.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------------------
# JPA / HIBERNATE PROPERTIES
# -------------------------------------------------------------------

# Controls how Hibernate (the JPA provider) manages the database tables based on our Java entity classes:
# - 'update': Hibernate will automatically create or alter tables to match our Java entities on startup.
# - This means we don't have to manually write SQL queries like 'CREATE TABLE' for now.
spring.jpa.hibernate.ddl-auto=update

# Tells Hibernate to print all executed SQL queries directly to the console.
# Highly recommended for beginners to see exactly what database queries Spring Boot runs in the background.
spring.jpa.show-sql=true

# Formats the printed SQL queries in the console to make them neat and readable.
spring.jpa.properties.hibernate.format_sql=true

# Explicitly specifies the SQL dialect Hibernate should use when generating queries.
# This ensures Hibernate generates syntax specifically optimized for MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

